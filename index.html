<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bandeira">
        <div class="faixa-verde"></div>
        <div class="faixa-branca"></div>
        <div class="faixa-vermelha"></div>
    </div>

    
    <div class="bandeira">
        <div class="faixa-preta"></div>
        <div class="faixa-amarela"></div>
        <div class="faixa-vermelha"></div>
    </div>
    
    
    <div class="bandeira">
        <div class="amarela"></div>
        <div class="azul"></div>
        <div class="vermelha"></div>
    </div>
    <div class="bandeira">
        <div class="japao-branca">
            <div class="japao-circulo"></div>
        </div>
    </div>
    
    <div class="bandeira">
        <div class="ea-vermelho"></div>
        <div class="band">
            <div class="ea-verde"></div>
            <div class="ea-branco"></div>
            <div class="ea-preto"></div>
        </div>
    </div>
    <div class="bandeira">
        <div class="retangulo">
            <div class="losango">
            </div>
            <div class="circulo">
            </div>    
        </div>
    </div>

    <div class="quadrado">
            <div class="cruz-branca">
            </div>
            <div class="cruz-deitada"></div>
        </div>

        <div class="bandeira-jor">
            <div class="jor-vermelho">
                <div class="jor-estrela"></div>
            </div>
            <div class="band-jordania">
                <div class="jor-preto"></div>
                <div class="jor-branco"></div>
                <div class="jor-verde"></div>
            </div>
        </div>
        <div class="bandeira-tri"></div>

        <div class="bandeira-tur">
            <div class="circulo-tur"></div>
            <div class="circulo-menor">
                <div class="estrela-tur"></div>
            </div>
        </div>

        <div class="bandeira-grecia">
            <div class="quadrado-grecia">
                <div class="cruz-grecia"></div>
                <div class="cruz-grecia-deitada"></div>
            </div>
            <div class="band-grecia">
            <div class="grecia-azul"></div>
            <div class="grecia-branca"></div>
            <div class="grecia-azul"></div>
            <div class="grecia-branca"></div>
            <div class="grecia-azul"></div>
            <div class="grecia-branca"></div>
            <div class="grecia-azul"></div>
            <div class="grecia-branca"></div>
            <div class="grecia-azul"></div>
            </div>
        </div>

        <div class="band-chile">
            <div class="quadrado-chile">
                <div class="estrela-chile"></div>
            </div>
            <div class="chile-branco"></div>
            <div class="chile-vermelho"></div>
        </div>
</body>
</html>
